name: CI

# Builds + tests the CxO decision-support app on every push/PR. The agent layer (intelligence module)
# depends on agent-kernel 1.0.0. The kernel isn't published to a Maven registry yet, so we build it from
# source at the v1.0.0 tag into the runner's local ~/.m2 so the reactor resolves agent-kernel-core /
# agent-orchestration / agent-kernel-spring / agent-provider-langchain4j / agent-store-postgres. The kernel
# repo is public — no token needed. (Switch to GitHub Packages once the kernel publishes artifacts there.)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Check out agent-kernel (dependency source)
        uses: actions/checkout@v4
        with:
          repository: jotder/agent-kernel
          path: agent-kernel
          ref: v1.0.0   # the released version this app pins (agent-kernel.version=1.0.0)

      - name: Install agent-kernel to local .m2
        run: mvn --batch-mode --no-transfer-progress -f agent-kernel/pom.xml install -DskipTests

      - name: Build + test
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
